  web:
    build:
      context: ./dio_website_cms
      dockerfile: Dockerfile
    volumes:
      - wagtail_db:/app/data               # здесь лежит db.sqlite3
      - wagtail_static:/app/static       # собранная статика
      - wagtail_media:/app/media         # загруженные пользователями файлы
    env_file:
      - .env
    
    ports:
      - "8000:8000"
    restart: unless-stopped
    command: >
      sh -c "
        echo '1. Применяем миграции...' &&
        python manage.py migrate --noinput &&
        
        echo '2. Создаем главную страницу...' &&
        python init_wagtail_final.py &&
        
        echo '3. Создаем суперюзера...' &&
        python create_superuser.py 2>/dev/null || echo 'Суперюзер уже существует' &&
        
        echo '4. Собираем статику...' &&
        python manage.py collectstatic --noinput --clear &&
        
        echo '=== WAGTAIL ГОТОВ ===' &&
        exec gunicorn dio_website_cms.wsgi:application --bind 0.0.0.0:8000 --workers 2 --access-logfile - --error-logfile - --log-level debug
      "
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); result=s.connect_ex(('localhost',8000)); exit(0 if result==0 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BACKUP_SCHEDULE: '${BACKUP_SCHEDULE:-0 2 * * 0}'
      RETENTION_DAYS: '${RETENTION_DAYS:-14}'
      BACKUP_DB_PATH: '${BACKUP_DB_PATH:-/app/data/db.sqlite3}'
      BACKUP_MEDIA_PATH: '${BACKUP_MEDIA_PATH:-/app/media}'
      BACKUP_ROOT: '/backup'
      RUN_BACKUP_ON_START: '${RUN_BACKUP_ON_START:-true}'
    volumes:
      - wagtail_db:/app/data:ro
      - wagtail_media:/app/media:ro
      - ./backups:/backup
    depends_on:
      web:
        condition: service_healthy

  backup_restore:
    build:
      context: ./backup
      dockerfile: Dockerfile
    profiles:
      - tools
    env_file:
      - .env
    environment:
      BACKUP_DB_PATH: '${BACKUP_DB_PATH:-/app/data/db.sqlite3}'
      BACKUP_MEDIA_PATH: '${BACKUP_MEDIA_PATH:-/app/media}'
      BACKUP_ROOT: '/backup'
    restart: "no"
    command: >
      sh -c "echo 'Использование: docker compose --profile tools run --rm backup_restore sh /usr/local/bin/restore.sh list'"
    volumes:
      - wagtail_db:/app/data
      - wagtail_media:/app/media
      - ./backups:/backup


volumes:
  redis_data:
  wagtail_db:         # ← сюда сохраняется db.sqlite3 и всё, что в /app/db
  wagtail_static:     # ← собранная статика (collectstatic)
  wagtail_media:      # ← медиа-файлы пользователей
